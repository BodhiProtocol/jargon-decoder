<style>
:root{
  --ink:#14101F;
  --panel:#201936;
  --panel-2:#2A2145;
  --lotus:#9D7BEA;
  --lavender:#C9B8F5;
  --gold:#E8B75A;
  --mist:#EDE9F7;
  --muted:#8B84A3;
  --line:rgba(157,123,234,.22);
}
*{margin:0;padding:0;box-sizing:border-box}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
body{
  background:var(--ink);color:var(--mist);
  font-family:'Inter',system-ui,sans-serif;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:880px;margin:0 auto;padding:0 24px}

header{padding:26px 0 0;display:flex;justify-content:center}
.brand{
  font-family:'IBM Plex Mono',monospace;font-size:.78rem;
  letter-spacing:.22em;color:var(--muted);text-transform:uppercase;
}
.brand b{color:var(--lotus);font-weight:500}

.hero{padding:46px 0 26px;text-align:center}
.hero h1{
  font-family:'Cormorant Garamond',serif;font-weight:600;
  font-size:clamp(2.3rem,6vw,3.6rem);line-height:1.1;
}
.hero h1 em{font-style:italic;color:var(--lotus)}
.hero p{margin:14px auto 0;max-width:460px;color:var(--muted);font-size:1rem}

/* mode toggle */
.modes{display:flex;justify-content:center;gap:0;padding:4px 0 22px}
.mode-btn{
  background:var(--panel);border:1px solid var(--line);
  color:var(--lavender);font-family:'Inter',sans-serif;font-weight:500;
  font-size:.88rem;padding:10px 26px;cursor:pointer;transition:all .25s ease;
}
.mode-btn:first-child{border-radius:999px 0 0 999px}
.mode-btn:last-child{border-radius:0 999px 999px 0;border-left:none}
.mode-btn.active{background:var(--lotus);border-color:var(--lotus);color:var(--ink)}
.mode-btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* decode bar */
.decode-zone{padding:0 0 18px}
.decode-bar{display:flex;gap:10px;max-width:620px;margin:0 auto}
.decode-bar input{
  flex:1;background:var(--panel);border:1.5px solid var(--line);
  border-radius:999px;padding:15px 24px;color:var(--mist);
  font-family:'Inter',sans-serif;font-size:1rem;outline:none;
  transition:border-color .25s ease;
}
.decode-bar input::placeholder{color:var(--muted)}
.decode-bar input:focus{border-color:var(--gold)}
.decode-bar button{
  background:var(--lotus);border:none;border-radius:999px;
  padding:0 26px;color:var(--ink);font-weight:600;font-size:.92rem;
  cursor:pointer;font-family:'Inter',sans-serif;transition:background .25s ease;
  white-space:nowrap;
}
.decode-bar button:hover{background:var(--gold)}
.decode-bar button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.count{
  text-align:center;margin-top:14px;
  font-family:'IBM Plex Mono',monospace;font-size:.72rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
}
.count b{color:var(--gold);font-weight:500}

/* category chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:18px 0 30px}
.chip{
  background:none;border:1px solid var(--line);border-radius:999px;
  padding:6px 16px;color:var(--lavender);font-size:.8rem;font-weight:500;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .25s ease;
}
.chip:hover{border-color:var(--lotus);background:var(--panel)}
.chip:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.chip.active{background:var(--lotus);border-color:var(--lotus);color:var(--ink)}

/* term cards */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding-bottom:60px}
.card{
  background:var(--panel);border:1px solid var(--line);
  border-radius:16px;padding:22px 24px;
  transition:border-color .25s ease;
}
.card:hover{border-color:var(--lotus)}
.card .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.card .cat{
  font-family:'IBM Plex Mono',monospace;font-size:.62rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--gold);
}
.badge{
  font-family:'IBM Plex Mono',monospace;font-size:.6rem;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink);background:var(--gold);border-radius:999px;
  padding:2px 10px;cursor:pointer;border:none;transition:background .25s ease;
}
.badge:hover{background:var(--lavender)}
.badge:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.card h3{
  font-family:'IBM Plex Mono',monospace;font-weight:500;
  font-size:1.05rem;color:var(--mist);margin-bottom:8px;letter-spacing:.02em;
}
.card .plain{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.12rem;color:var(--lavender);line-height:1.45;margin-bottom:10px;
}
.card .more{font-size:.86rem;color:var(--muted)}
.card .viz{
  display:none;margin-top:16px;padding-top:16px;
  border-top:1px dashed var(--line);
}
.card.open .viz{display:block}
.viz svg{width:100%;height:auto;display:block}
.viz text{font-family:'Inter',sans-serif;fill:var(--mist)}
.viz .vs{font-size:10px;fill:var(--muted)}
.viz .vt{font-size:11px;font-weight:600;fill:var(--mist)}
.viz .vg{fill:var(--gold)}
.viz .vgt{font-size:11px;font-weight:600;fill:var(--ink)}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
.empty .big{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.4rem;color:var(--lavender);margin-bottom:8px;
}

/* test mode */
.test-zone{display:none;padding:6px 0 70px}
.test-zone.on{display:block}
.decode-view{display:block}
.decode-view.off{display:none}
.flash{
  background:var(--panel);border:1px solid var(--line);border-radius:20px;
  max-width:560px;margin:0 auto;padding:40px 38px;text-align:center;
}
.flash .fcat{
  font-family:'IBM Plex Mono',monospace;font-size:.66rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;
}
.flash .fplain{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.5rem;color:var(--lavender);line-height:1.4;margin-bottom:26px;
}
.flash .fterm{
  display:none;font-family:'IBM Plex Mono',monospace;font-weight:500;
  font-size:1.5rem;color:var(--gold);letter-spacing:.03em;margin-bottom:12px;
}
.flash .fmore{display:none;font-size:.9rem;color:var(--muted);margin-bottom:26px}
.flash.revealed .fterm,.flash.revealed .fmore{display:block}
.fbtns{display:flex;gap:10px;justify-content:center}
.fbtn{
  border-radius:999px;padding:12px 30px;font-family:'Inter',sans-serif;
  font-weight:600;font-size:.92rem;cursor:pointer;transition:all .25s ease;
}
.fbtn.primary{background:var(--lotus);border:none;color:var(--ink)}
.fbtn.primary:hover{background:var(--gold)}
.fbtn.ghost{background:none;border:1px solid var(--line);color:var(--lavender)}
.fbtn.ghost:hover{border-color:var(--lotus)}
.fbtn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.fcount{
  text-align:center;margin-top:18px;
  font-family:'IBM Plex Mono',monospace;font-size:.72rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
}
.fcount b{color:var(--gold);font-weight:500}

footer{border-top:1px solid var(--line);padding:32px 0 44px;text-align:center}
footer .om{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--lavender);font-size:1.02rem;margin-bottom:10px;
}
footer .meta{
  font-family:'IBM Plex Mono',monospace;font-size:.72rem;
  letter-spacing:.16em;color:var(--muted);text-transform:uppercase;
}
footer .meta a{color:var(--lotus);text-decoration:none}
footer .meta a:hover{color:var(--gold)}

@media (max-width:640px){
  .grid{grid-template-columns:1fr}
  .decode-bar{flex-direction:column}
  .decode-bar button{padding:13px 26px}
  .flash{padding:30px 22px}
}
</style>
</head>
<body>

<header>
  <div class="brand">Bodhi<b>Protocol</b> · Awakening Through Play</div>
</header>

<section class="hero wrap">

<text class="vs" x="140" y="63" text-anchor="middle">Match</text>

const TERMS = [
{t:"Order Book",c:0,p:"The exchange's live list of everyone waiting to buy or sell, and at what price.",m:"Buy orders (bids) on one side, sell orders (asks) on the other. Where they meet, trades happen."},

{t:"Execution",c:0,p:"The instant a buyer and seller are matched. Intention becomes transaction.",m:"Done by the exchange's matching engine, usually in microseconds, by price-time priority."},
{t:"Allocation",c:0,p:"Splitting one big institutional trade across the many client accounts it was really for.",m:"A fund manager buys 1 lakh shares in one order, then allocates them across dozens of funds."},
{t:"Confirmation",c:0,p:"Both sides comparing notes: \"Did we just agree to the same trade?\"",m:"Price, quantity, security, settlement date — all matched before money moves. Mismatches become breaks."},
{t:"Trade Enrichment",c:0,p:"Adding everything the raw trade forgot: fees, taxes, accounts, settlement instructions.",m:"The matching engine records the bare minimum. Downstream systems need the full story."},
{t:"STP",c:0,p:"Straight-Through Processing — a trade that flows from order to settlement with no human touching it.",m:"The goal of every trading system. Every manual touch adds cost, delay, and error."},

{t:"Break",c:0,p:"A mismatch between two records that should agree. The reconciliation failed.",m:"Someone has to investigate, find the truth, and fix a system. Often that someone is a BA."},
{t:"Failed Trade",c:0,p:"Settlement day arrived, but the shares or the money didn't.",m:"Fails cost penalties and trust. Persistent fails can trigger a buy-in — forced purchase at your expense."},
{t:"Corporate Action",c:0,p:"The company does something that changes what your shares mean: dividend, split, merger, bonus issue.",m:"Mandatory ones happen to you; voluntary ones ask you to choose. Systems must apply them precisely."},
{t:"Record Date",c:0,p:"The day the company checks its shareholder list to decide who gets the dividend.",m:"Own it on record date, you're paid. The ex-date, just before, is when the stock trades without that right."},

{t:"ISIN",c:0,p:"A security's passport number — a 12-character code identifying it globally.",m:"INE002A01018 is Reliance Industries. Every system, everywhere, agrees on it."},
{t:"Demat",c:0,p:"Your shares as electronic entries instead of paper certificates.",m:"Held at a depository (NSDL or CDSL in India) via your demat account. No paper, no forgery, no loss."},
{t:"Novation",c:1,p:"The clearing house steps into the middle: it becomes the buyer to every seller and the seller to every buyer.",m:"You no longer face the stranger you traded with — you face the CCP. Counterparty risk, absorbed."},

{t:"Netting",c:1,p:"Cancelling offsetting obligations so only the difference moves.",m:"Bought 500, sold 300 of the same stock the same day? Settle 200. Less movement, less risk, less cost."},

{t:"Surveillance",c:3,p:"Watching every trade for patterns that shouldn't exist.",m:"Spoofing, layering, pump-and-dump — algorithms hunt algorithms. Alerts land on human desks for judgment."},

{t:"Circuit Breaker",c:3,p:"An automatic pause when prices move too far, too fast.",m:"Markets halt so panic can cool. India halts trading at 10%, 15%, and 20% index moves."},
{t:"Basis Point",c:3,p:"One hundredth of one percent. The market's smallest unit of seriousness.",m:"100 bps = 1%. When billions move, 0.01% is real money — so it earned its own name."},
{t:"VaR",c:3,p:"Value at Risk — \"how much could we lose on a bad day, with 99% confidence?\"",m:"One number summarising portfolio risk. Useful, famous, and famously silent about the worst 1%."},

{t:"Liquidity",c:3,p:"How easily you can trade without moving the price against yourself.",m:"Deep markets absorb big orders quietly. Illiquid ones punish urgency."},

/* ---------- decode mode ---------- */
const grid=document.getElementById("grid");
const countEl=document.getElementById("count");
const q=document.getElementById("q");
const chipsEl=document.getElementById("chips");
let activeCat=-1;

function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}

function render(){
  const query=q.value.trim().toLowerCase();
  const list=TERMS.filter(x=>{
    const catOk = activeCat===-1 || x.c===activeCat;
    const qOk = !query || x.t.toLowerCase().includes(query) || x.p.toLowerCase().includes(query) || x.m.toLowerCase().includes(query);
    return catOk && qOk;
  });
  if(!list.length){
    grid.innerHTML=`<div class="empty"><div class="big">Not in the book — yet.</div>Try another word, or clear the filter. The wall is tall; the door is patient.</div>`;
  }else{
    grid.innerHTML=list.map((x,idx)=>{
      const hasViz=!!DIAG[x.t];
      return `
      <div class="card${hasViz?' has-viz':''}" data-term="${esc(x.t)}">
        <div class="top">
          <div class="cat">${CATS[x.c]}</div>
          ${hasViz?`<button class="badge" type="button" data-viz="${esc(x.t)}">◆ visual</button>`:""}
        </div>
        <h3>${esc(x.t)}</h3>
        <p class="plain">${esc(x.p)}</p>
        <p class="more">${esc(x.m)}</p>
        ${hasViz?`<div class="viz">${DIAG[x.t]}</div>`:""}
      </div>`;
    }).join("");
    grid.querySelectorAll(".badge").forEach(b=>{
      b.addEventListener("click",e=>{
        e.currentTarget.closest(".card").classList.toggle("open");
      });
    });
  }
  countEl.innerHTML = `<b>${list.length}</b> of ${TERMS.length} terms decoded`;
}

const allChip=document.createElement("button");
allChip.className="chip active";allChip.textContent="All";
allChip.addEventListener("click",()=>{activeCat=-1;setChip(allChip);render();});
chipsEl.appendChild(allChip);
CATS.forEach((c,i)=>{
  const b=document.createElement("button");
  b.className="chip";b.textContent=c;
  b.addEventListener("click",()=>{activeCat=i;setChip(b);render();});
  chipsEl.appendChild(b);
});
function setChip(el){document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));el.classList.add("active");}

q.addEventListener("input",render);
document.getElementById("surprise").addEventListener("click",()=>{
  const t=TERMS[Math.floor(Math.random()*TERMS.length)];
  activeCat=-1;setChip(allChip);
  q.value=t.t;render();
  const card=grid.querySelector(`.card[data-term="${CSS.escape(t.t)}"]`);
  if(card && card.classList.contains("has-viz"))card.classList.add("open");
});

/* ---------- test mode ---------- */
const flash=document.getElementById("flash");
const fcat=document.getElementById("fcat"),fplain=document.getElementById("fplain"),
      fterm=document.getElementById("fterm"),fmore=document.getElementById("fmore"),
      fcountEl=document.getElementById("fcount");
let deck=[],deckPos=0,seen=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function nextCard(){
  if(deckPos>=deck.length){deck=shuffle([...TERMS]);deckPos=0;}
  const t=deck[deckPos++];seen++;
  flash.classList.remove("revealed");
  fcat.textContent=CATS[t.c];
  fplain.textContent=t.p;
  fterm.textContent=t.t;
  fmore.textContent=t.m;
  fcountEl.innerHTML=`card <b>${seen}</b> · ${TERMS.length} terms in the deck`;
}
document.getElementById("frevbtn").addEventListener("click",()=>flash.classList.add("revealed"));
document.getElementById("fnextbtn").addEventListener("click",nextCard);

/* ---------- mode switch ---------- */
const decodeView=document.getElementById("decodeView");
const testZone=document.getElementById("testZone");
const mDecode=document.getElementById("modeDecode");
const mTest=document.getElementById("modeTest");
mDecode.addEventListener("click",()=>{
  mDecode.classList.add("active");mTest.classList.remove("active");
  decodeView.classList.remove("off");testZone.classList.remove("on");
});
mTest.addEventListener("click",()=>{
  mTest.classList.add("active");mDecode.classList.remove("active");
  decodeView.classList.add("off");testZone.classList.add("on");
  if(!deck.length)nextCard();
});

render();
</script>
